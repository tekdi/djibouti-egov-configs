              - inJsonPath: $.processInstance
                outJsonPath: $.Data.processInstance
              - inJsonPath: $.documents
                outJsonPath: $.Data.documents   
              - inJsonPath: $.@timestamp
                outJsonPath: $.Data.@timestamp

