          type: general
          id: $.applicationNumber,$.tenantId
          jsonPath: $
          timeStampField: $.applicationDate
          customJsonMapping:
            indexMapping: |
              {
                "Data": {
                  "applicationType": "",
                  "applicationNumber": "",
                  "applicationDate": "",
                  "status": "",
