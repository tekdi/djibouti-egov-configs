ServiceMaps:
  serviceName: Public Service
  version: 1.0.0
  mappings:
    - topic: save-public-service-application
      configKey: INDEX
      indexes:
        - name: public-service-index
          type: general
          id: $.applicationNumber,$.tenantId
          jsonPath: $.Application
          timeStampField: $.auditDetails.createdTime
          customJsonMapping:
            indexMapping: {"Data": {"id": "","tenantId": "","module": "","businessService": "","status": "","channel": "","applicationNumber": "","reference": {},"workflowStatus": "","serviceCode": "","serviceDetails": {},"applicants": [],"additionalDetails": {},"address": {},"workflow": {"comment": "", "action": "", "assignees": []},"auditDetails": {},"processInstance": {},"documents":[],@timestamp": "timestamp"}}
            fieldMapping:
              - inJsonPath: $.id
                outJsonPath: $.Data.id
              - inJsonPath: $.tenantId
                outJsonPath: $.Data.tenantId
              - inJsonPath: $.module
                outJsonPath: $.Data.module
              - inJsonPath: $.businessService
                outJsonPath: $.Data.businessService
